<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>简历管理 · 仅作者</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: Inter, system-ui, sans-serif; }
    .admin-input {
      @apply w-full rounded-xl border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm text-zinc-100 outline-none focus:border-violet-500;
    }
  </style>
</head>
<body class="min-h-screen bg-zinc-950 text-zinc-100">
  <div id="login-screen" class="flex min-h-screen items-center justify-center px-4">
    <form id="login-form" class="w-full max-w-sm rounded-3xl border border-zinc-800 bg-zinc-900 p-8">
      <h1 class="text-xl font-semibold">简历管理后台</h1>
      <p class="mt-2 text-xs text-zinc-500">仅你本人使用。请勿分享密码或 GitHub Token。</p>
      <label class="mt-6 block text-xs text-zinc-400">管理密码</label>
      <input type="password" id="login-password" class="mt-1 w-full rounded-xl border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm" autocomplete="current-password" />
      <p id="login-error" class="mt-2 hidden text-xs text-red-400"></p>
      <button type="submit" class="mt-4 w-full rounded-xl bg-violet-600 py-2 text-sm font-medium hover:bg-violet-500">进入</button>
      <a href="index.html" class="mt-4 block text-center text-xs text-zinc-500 hover:text-zinc-300">← 返回简历首页</a>
    </form>
  </div>

  <div id="admin-app" class="hidden">
    <header class="sticky top-0 z-10 border-b border-zinc-800 bg-zinc-950/95 backdrop-blur">
      <div class="mx-auto flex max-w-4xl flex-wrap items-center justify-between gap-3 px-4 py-3">
        <div>
          <h1 class="text-lg font-semibold">内容编辑</h1>
          <p id="save-status" class="text-xs text-zinc-500">未保存</p>
        </div>
        <div class="flex flex-wrap gap-2">
          <button type="button" id="btn-load-site" class="rounded-lg border border-zinc-700 px-3 py-1.5 text-xs hover:bg-zinc-900">从本站加载</button>
          <button type="button" id="btn-reload" class="rounded-lg border border-zinc-700 px-3 py-1.5 text-xs hover:bg-zinc-900">从 GitHub 重新加载</button>
          <button type="button" id="btn-preview" class="rounded-lg border border-zinc-700 px-3 py-1.5 text-xs hover:bg-zinc-900">预览站点</button>
          <button type="button" id="btn-publish" class="rounded-lg bg-cyan-600 px-4 py-1.5 text-xs font-medium hover:bg-cyan-500">发布到 GitHub Pages</button>
          <button type="button" id="btn-logout" class="rounded-lg border border-zinc-800 px-3 py-1.5 text-xs text-zinc-500">退出</button>
        </div>
      </div>
      <nav id="admin-nav" class="mx-auto flex max-w-4xl gap-1 overflow-x-auto px-4 pb-2 text-xs"></nav>
    </header>
    <main id="admin-panel" class="mx-auto max-w-4xl px-4 py-6 pb-20"></main>
  </div>

  <script src="admin-config.js" onerror="window.ADMIN_CONFIG_MISSING=true"></script>
  <script type="module" src="js/admin-app.js"></script>
</body>
</html>
