<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="徐辉 — Vibecoder / 全栈工程师" />
  <title>徐辉 | 个人简历</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Inter"', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    @keyframes staggerFadeIn {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .bento-enter {
      opacity: 0;
      animation: staggerFadeIn 0.65s ease-out forwards;
    }
    .bento-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .bento-card:hover {
      transform: translateY(-4px);
      border-color: rgb(82 82 91);
      box-shadow:
        0 0 0 1px rgba(139, 92, 246, 0.15),
        0 12px 40px -12px rgba(6, 182, 212, 0.25),
        0 8px 24px -8px rgba(139, 92, 246, 0.2);
    }
    .gradient-ai {
      background: linear-gradient(to right, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
  </style>
</head>
<body class="min-h-screen bg-zinc-950 text-zinc-100 font-sans antialiased" data-lang="zh">
  <div class="mx-auto max-w-5xl px-4 py-10 sm:px-6 sm:py-14">
    <header class="mb-8 flex items-center justify-between">
      <p id="header-subtitle" class="text-sm text-zinc-500">个人简历 · Bento</p>
      <div class="flex gap-2 rounded-full border border-zinc-800 bg-zinc-900/80 p-1">
        <button type="button" id="btn-zh" class="rounded-full px-3 py-1 text-xs font-medium text-zinc-100 bg-zinc-800" aria-pressed="true">中文</button>
        <button type="button" id="btn-en" class="rounded-full px-3 py-1 text-xs font-medium text-zinc-400 hover:text-zinc-100" aria-pressed="false">EN</button>
      </div>
    </header>

    <main id="bento-grid" class="grid grid-cols-1 gap-4 md:grid-cols-3 md:auto-rows-[minmax(140px,auto)]">
      <p class="col-span-full text-center text-sm text-zinc-500">加载中…</p>
    </main>

    <footer class="mt-10 text-center text-xs text-zinc-600">
      <span id="footer-text"></span>
    </footer>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
